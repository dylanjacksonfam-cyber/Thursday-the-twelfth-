<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thursday the twelfth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            cursor: crosshair;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            z-index: 10;
        }

        #ui-container {
            text-align: center;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 1px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }

        h1 {
            color: #0f0;
            letter-spacing: 12px;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>

<body>

    <div id="crosshair"></div>
    <div id="overlay">
        <div id="ui-container">
            <h1>Thursday the twelfth</h1>
            <p>CLICK TO BEGIN SQUAD OPERATION</p>
            <p style="font-size: 0.7em; color: #444;">WASD: MOVE | F: LIGHT | CLICK: FIRE</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // --- 1. AUDIO ENGINE ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playGunshot() {
            const dur = 0.12;
            const osc = audioCtx.createOscillator();
            const noise = audioCtx.createBufferSource();
            const g = audioCtx.createGain();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + dur);
            g.gain.setValueAtTime(0.4, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            noise.connect(g); osc.connect(g); g.connect(audioCtx.destination);
            noise.start(); osc.start(); noise.stop(audioCtx.currentTime + dur); osc.stop(audioCtx.currentTime + dur);
        }

        // --- 2. ADVANCED SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010203);
        scene.fog = new THREE.FogExp2(0x000000, 0.04);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0x404040, 0.2);
        scene.add(ambient);

        const moonLight = new THREE.DirectionalLight(0x223344, 0.3);
        moonLight.position.set(50, 100, 50);
        scene.add(moonLight);

        function createGroundTex() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0b08'; ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 10000; i++) {
                ctx.fillStyle = `rgba(20,25,15,${Math.random() * 0.3})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1, 1);
            }
            return new THREE.CanvasTexture(canvas);
        }
        const groundTex = createGroundTex();
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(25, 25);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.9 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        scene.add(floor);

        // --- 3. HIGH-DETAIL WEAPON ---
        const weaponGroup = new THREE.Group();
        const metalMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 });

        const slide = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.14, 0.6), metalMat);
        slide.position.y = 0.05;
        weaponGroup.add(slide);

        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.2), metalMat);
        barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.05, -0.3);
        weaponGroup.add(barrel);

        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.38, 0.18), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 }));
        handle.position.set(0, -0.2, 0.15); handle.rotation.x = -0.3;
        weaponGroup.add(handle);

        const flashlight = new THREE.SpotLight(0xffffff, 4, 30, Math.PI / 6, 0.4, 1);
        flashlight.castShadow = true;
        flashlight.position.set(0, -0.05, -0.2);
        flashlight.target.position.set(0, -0.05, -10);
        weaponGroup.add(flashlight, flashlight.target);

        const flashTex = new THREE.CanvasTexture((() => {
            const c = document.createElement('canvas'); c.width = 64; c.height = 64; const x = c.getContext('2d');
            const g = x.createRadialGradient(32, 32, 0, 32, 32, 32); g.addColorStop(0, 'white'); g.addColorStop(0.2, 'orange'); g.addColorStop(1, 'black');
            x.fillStyle = g; x.fillRect(0, 0, 64, 64); return c;
        })());
        const muzzleFlash = new THREE.Sprite(new THREE.SpriteMaterial({ map: flashTex, blending: THREE.AdditiveBlending }));
        muzzleFlash.scale.set(0.6, 0.6, 1); muzzleFlash.position.set(0, 0.05, -0.5);
        muzzleFlash.visible = false;
        weaponGroup.add(muzzleFlash);

        weaponGroup.position.set(0.35, -0.35, -0.7);
        camera.add(weaponGroup);
        scene.add(camera);

        // --- 4. REALISTIC TREES ---
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.5, 9, 8), new THREE.MeshStandardMaterial({ color: 0x1a0f08 }));
            trunk.position.y = 4.5; trunk.castShadow = true; trunk.receiveShadow = true;
            const canopy = new THREE.Mesh(new THREE.IcosahedronGeometry(2.5, 0), new THREE.MeshStandardMaterial({ color: 0x050804 }));
            canopy.position.y = 8; canopy.castShadow = true;
            treeGroup.add(trunk, canopy);
            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }
        for (let i = 0; i < 50; i++) createTree(Math.random() * 120 - 60, Math.random() * 120 - 60);

        // --- 5. REALISTIC ZOMBIE SYSTEM ---
            const zombies = [];
            const zombieTargets = [];
            const raycaster = new THREE.Raycaster();

            function spawnZombie() {
                const group = new THREE.Group();

                // Materials (Standard reacts to light, no self-glow)
                const skinMat = new THREE.MeshStandardMaterial({ color: 0x1a1c17, roughness: 0.9 });
                const clothesMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 1.0 });

                // Torso (Tapered Cylinder for a skeletal ribcage look)
                const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 1, 6), clothesMat);
                torso.position.y = 1.1;
                torso.rotation.x = 0.45; // Predatory hunch
                torso.castShadow = true;
                group.add(torso);

                // Head (Smaller and offset forward)
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.28, 0.25), skinMat);
                head.position.set(0, 1.7, -0.25);
                group.add(head);

                // Glowing Dead Eyes (Dimmed for realism)
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0x880000 });
                const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.02), eyeMat);
                eyeL.position.set(0.08, 1.75, -0.38);
                const eyeR = eyeL.clone();
                eyeR.position.set(-0.08, 1.75, -0.38);
                group.add(eyeL, eyeR);

                // Arms (Asymmetrical reaching limbs)
                const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 1.1), skinMat);
                armL.position.set(0.35, 1.4, -0.4);
                armL.rotation.x = -1.3;

                const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.8), skinMat);
                armR.position.set(-0.35, 1.25, -0.1);
                armR.rotation.x = -0.5;
                group.add(armL, armR);

                // Legs
                const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 1), clothesMat);
                legL.position.set(0.15, 0.5, 0.1);
                const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.05, 1), clothesMat);
                legR.position.set(-0.15, 0.5, -0.1);
                group.add(legL, legR);

                // Position in fog
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 20;
                group.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);

                scene.add(group);

                // Logic Data (Matches your original structure exactly)
                zombies.push({
                    mesh: group,
                    health: 3,
                    limbs: { armL, armR, legL, legR },
                    offset: Math.random() * 100
                });
                zombieTargets.push(torso, head);
            }

            for (let i = 0; i < 8; i++) spawnZombie();

        function shoot() {
                playGunshot();

                // 1. THE EXPLOSION SPRITE (The actual "fire" at the barrel)
                // We scale it up randomly each time for variety
                muzzleFlash.visible = true;
                muzzleFlash.scale.set(0.8 + Math.random(), 0.8 + Math.random(), 1);
                muzzleFlash.material.rotation = Math.random() * Math.PI;
                muzzleFlash.material.opacity = 1;

                // 2. THE VOLUMETRIC ENVIRONMENTAL LIGHT
                // We use a warm "powder burn" color (0xff9900)
                const worldFlash = new THREE.PointLight(0xff9900, 25, 20); // Much higher intensity
                worldFlash.position.copy(camera.position);
                scene.add(worldFlash);

                // 3. PHYSICAL RECOIL & CAMERA SHAKE
                slide.position.z += 0.15;
                weaponGroup.position.z += 0.08;
                camera.rotation.x += 0.03 + Math.random() * 0.02; // Random kick height
                camera.rotation.z += (Math.random() - 0.5) * 0.02; // Side-to-side rattle

                // 4. HIT DETECTION (3-Shot Kill)
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const hits = raycaster.intersectObjects(zombieTargets);

                if (hits.length > 0) {
                    const hitObject = hits[0].object;
                    const zData = zombies.find(z => z.mesh === hitObject.parent || z.mesh === hitObject);
                    if (zData) {
                        zData.health -= 1;
                        zData.mesh.traverse(child => {
                            if (child.material && child.material.emissive) {
                                child.material.emissive.setHex(0xff0000);
                                setTimeout(() => { if (child.material) child.material.emissive.setHex(0x000000); }, 60);
                            }
                        });
                        if (zData.health <= 0) {
                            scene.remove(zData.mesh);
                            zData.mesh.traverse(c => { const i = zombieTargets.indexOf(c); if (i > -1) zombieTargets.splice(i, 1); });
                            zombies.splice(zombies.indexOf(zData), 1);
                            setTimeout(spawnZombie, );
                        }
                    }
                }

                // 5. THE "DISSIPATION" (Smoothing out the flash exit)
                // Real flashes don't just "cut off"; they fade extremely fast
                let fadeFrames = 0;
                const fadeOut = () => {
                    fadeFrames++;
                    muzzleFlash.material.opacity *= 0.5; // Exponential decay
                    worldFlash.intensity *= 0.4;

                    if (fadeFrames < 4) {
                        requestAnimationFrame(fadeOut);
                    } else {
                        muzzleFlash.visible = false;
                        scene.remove(worldFlash);
                        slide.position.z -= 0.15;
                        weaponGroup.position.z -= 0.08;
                    }
                };
                requestAnimationFrame(fadeOut);
            }
        const controls = new PointerLockControls(camera, document.body);
        let moveF = false, moveB = false, moveL = false, moveR = false;
        const velocity = new THREE.Vector3();

        document.addEventListener('click', () => {
            initAudio();
            if (!controls.isLocked) { controls.lock(); document.getElementById('overlay').style.display = 'none'; }
            else shoot();
        });
        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveF = true; if (e.code === 'KeyS') moveB = true;
            if (e.code === 'KeyA') moveL = true; if (e.code === 'KeyD') moveR = true;
            if (e.code === 'KeyF') flashlight.visible = !flashlight.visible;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveF = false; if (e.code === 'KeyS') moveB = false;
            if (e.code === 'KeyA') moveL = false; if (e.code === 'KeyD') moveR = false;
        });

        controls.addEventListener('unlock', () => { document.getElementById('overlay').style.display = 'flex'; });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const delta = clock.getDelta();
                velocity.x -= velocity.x * 10 * delta;
                velocity.z -= velocity.z * 10 * delta;
                const dir = new THREE.Vector3(Number(moveR) - Number(moveL), 0, Number(moveF) - Number(moveB)).normalize();
                if (moveF || moveB) velocity.z -= dir.z * 160 * delta;
                if (moveL || moveR) velocity.x -= dir.x * 160 * delta;
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Zombie AI & Animation
                zombies.forEach(z => {
                    const time = performance.now() * 0.002 + z.offset;
                    const moveDir = new THREE.Vector3().subVectors(camera.position, z.mesh.position).normalize();

                    // Move toward player
                    z.mesh.position.x += moveDir.x * 1.8 * delta;
                    z.mesh.position.z += moveDir.z * 1.8 * delta;
                    z.mesh.lookAt(camera.position.x, 0, camera.position.z);

                    // Stumble Animation
                    z.mesh.rotation.z = Math.sin(time) * 0.05; // Shaking/limping
                    z.limbs.armL.rotation.x = -Math.PI / 2.5 + Math.sin(time * 2) * 0.1;
                    z.limbs.armR.rotation.x = -Math.PI / 2.5 + Math.cos(time * 2) * 0.1;
                    z.limbs.legL.rotation.x = Math.sin(time * 5) * 0.2;
                    z.limbs.legR.rotation.x = Math.cos(time * 5) * 0.2;
                });

                camera.rotation.z = 0;
                camera.position.y = 1.6 + Math.sin(performance.now() * 0.008) * 0.02;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
